<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="La Cachina FIEI — Marketplace de hardware para estudiantes de la UNFV. Compra y vende componentes electrónicos de forma segura dentro del campus.">
  <meta name="theme-color" content="#EA580C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La Cachina FIEI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>La Cachina FIEI — Marketplace de Hardware UNFV</title>
  <link rel="manifest" href="manifest.json">

  <!-- ═══════════════════════════════════════════════════════════
       FUENTES E ICONOS — CRÍTICO para que los íconos no aparezcan
       como cuadrados vacíos en Flutter Web.
       Flutter Web NO incluye estas fuentes automáticamente en el
       renderer HTML; deben cargarse desde aquí.
       ═══════════════════════════════════════════════════════════ -->

  <!-- 1. Material Icons (requerido para todos los Icons.* de Flutter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round|Material+Icons+Sharp" rel="stylesheet">

  <!-- 2. Material Symbols (iconos modernos de Flutter 3.x) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <!-- 3. Google Fonts: Inter + Outfit (usados por google_fonts package) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Evita el flash de fondo blanco mientras carga Flutter */
    body {
      background-color: #18181B;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
